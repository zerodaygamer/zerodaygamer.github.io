# ---- site ----
title: YadoreZ
tagline: reverse engineering · game hacking · robotics
description: >-
  Writeups and field notes on reverse engineering, game hacking,
  malware analysis, and robotics — by YadoreZ.
author: YadoreZ
future: true

# ---- urls (EDIT before deploy) ----
# Personal site repo (<you>.github.io): leave baseurl empty.
# Project repo: set baseurl: "/<repo-name>".
url: "https://zerodaygamer.github.io"
baseurl: ""

# ---- socials (EDIT) ----
github_username: zerodaygamer
twitter_username: zerodaygamer
youtube_url: ""

# ---- build ----
markdown: kramdown
highlighter: rouge
permalink: /writeups/:title/
timezone: Asia/Manila

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
